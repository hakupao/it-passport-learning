# pnpm workspace (TS/JS apps only)
# Phase 1 packages/extractor/ is Python uv — NOT a pnpm workspace member.
# Per D-093 §2.3.
packages:
  - "apps/*"

# pnpm 11+ refuses build scripts by default (security). Explicit approval below.
# sharp = Next.js native image optimization (libvips bindings)
# unrs-resolver = Rust-based ESM/CJS resolver used by Next.js / @ai-sdk
allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  sharp: true
  unrs-resolver: true

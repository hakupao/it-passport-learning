[project]
name = "cert-extractor"
version = "0.1.0"
description = "Pluggable OCR + LLM-driven content extractor for certification exam books"
requires-python = ">=3.11,<4.0"
authors = [
    { name = "hakupao", email = "59277722+hakupao@users.noreply.github.com" },
]
license = "MIT"
dependencies = [
    "pydantic>=2.7,<3",
    "pyyaml>=6",
    "click>=8",
    "claude-agent-sdk>=0.1.5",
    "mistralai>=1.0",
    "packaging>=21",
]

[project.scripts]
cert-extractor = "cert_extractor.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cert_extractor"]
